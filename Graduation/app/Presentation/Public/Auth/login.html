<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Login Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: black;
        }

        .cover {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: url("des3.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .cover::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
        }

        .login-box {
            position: relative;
            z-index: 2;
            background-color: #000000;
            color: white;
            padding: 35px;
            width: 100%;
            max-width: 420px;
            border-radius: 8px;
            border-top: 4px solid #e63946;
            ;
        }

        .login-box h3 {
            margin-bottom: 10px;
            font-weight: bold;
        }

        .form-control {
            background-color: #222;
            border: none;
            color: #fff;
        }

        .form-control:focus {
            background-color: #222;
            color: #fff;
            box-shadow: 0 0 0 2px #e63946;
        }

        .btn-login {
            background-color: #e63946;
            width: 100%;
            border: none;
            padding: 10px;
            font-weight: bold;
        }

        .btn-login:hover {
            background-color: #c92f3a;
            color: white;
        }

        .btn-enter {
            background-color: #000000;
            width: 100%;
            border: none;
            padding: 10px;
            font-weight: bold;
            color: #fff;
        }

        .btn-enter:hover {
            background-color: #ffffff;
            color: #000000;
        }

        @keyframes move {
            0% {
                transform: translateY(0);
                opacity: 0.5;
            }

            100% {
                transform: translateY(15px);
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-dark">
    <section class="cover">
        <div class="login-box">
            <center>
                <a href="#"><img src="loginloogo.png" height=100 weight=100></a>
                <h3>🔴 تسجيل الدخول</h3>
                <div class="text-secondary mb-4">الدخول الى صفحة الموقع الرئيسية
                    <div class="card-body text-center">
                        <br>
                        <form action="loginPage_logic.php" method="post">
                            <div class="mb-3">
                                <label>اسم المستخدم</label>
                                <input type="text" name="username" class="form-control" placeholder="اسم المستخدم">
                            </div>
                            <div class="mb-3">
                                <label>كلمة السر</label>
                                <input type="password" name="passward" class="form-control" placeholder="كلمة السر"
                                    required>
                            </div>
                            <button type="submit" name="login" class="btn btn-login">تسجيل الدخول</button>
                        </form>
                        <button class="btn-enter" onclick="window.location.href='home.html'">الرجوع الى
                            الصفحةالرئيسية</button>
            </center>
        </div>
        </div>
        </div>
    </section>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</html>
