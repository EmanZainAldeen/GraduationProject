<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Home Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        .cover {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #000;
            position: relative;
        }

        .cover img {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .cover h1 {
            position: relative;
            z-index: 2;
            color: white;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            font-size: 3rem;
            text-align: center;
            padding: 0 20px;
        }

        @media(max-width: 768px) {
            .cover img {
                position: absolute;
                top: 50%;
                left: 50%;
                min-width: 100%;
                min-height: 100%;
                width: auto;
                height: auto;
                transform: translate(-50%, -50%);
                object-fit: cover;
            }
        }

        .scroll-down {
            color: white;
            font-size: 25px;
            animation: move 1s infinite alternate;
        }

        .overlay {
            position: absolute;
            top: 0%;
            left: 0%;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 60px;
            background: rgba(78, 77, 77, 0.549);
        }

        .btn-enter {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 12px 30px;
            font-size: 20px;
            text-decoration: underline;
            margin-bottom: 25px;
            border-radius: 30px;
            transition: 0.3s;
        }

        .btn-enter:hover {
            background: white;
            color: #000;
            transform: scale(1.05);
        }

        @keyframes move {
            0% {
                transform: translateY(0);
                opacity: 0.5;
            }

            100% {
                transform: translateY(15px);
                opacity: 1;
            }
        }

        .content {
            padding: 50px 20px;
            text-align: center;
            font-size: 1.2rem;
        }
    </style>
</head>

<body class="bg-light">
    <section class="cover">
        <img src="home.jpeg" alt="cover">
        <div class="overlay">
            <div class="content">
                <a href="dashboardPage.php" class="btn-enter">الدخول الى الصفحة الرئيسية</a>
                <div class="scoll-down">
                    <i class="bi bi-chervon-down"></i>
                </div>
            </div>
        </div>
    </section>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</html>
